# Starship Configuration - Elegant Prompt mit Svelte, Node.js und Docker Support

format = """
[─>](bold green) $directory$nodejs$svelte$docker_context$git_branch$git_status $cmd_duration
[❯](bold green) """

right_format = "$time"

[username]
show_always = true
format = "[$user]($style) "
style_user = "bold yellow"

[hostname]
format = "[@$hostname]($style) "
style = "bold cyan"

[directory]
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold blue"
read_only = " 🔒"
read_only_style = "bold red"
truncation_length = 3
truncate_to_repo = false
home_symbol = "🏠"

[git_branch]
format = "[on]($style) [$symbol$branch]($style) "
style = "bold purple"
symbol = "🌱 "

[git_status]
format = "([\\($all_status$ahead_behind\\)]($style) )"
style = "bold red"
conflicted = "🏳"
diverged = "😵"
renamed = "👅 "
deleted = "🗑 "

[nodejs]
format = "[⬢ $version]($style) "
style = "bold green"
disabled = false
detect_extensions = ["js", "mjs", "cjs", "ts", "tsx", "json", "tsx", "jsx"]
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[svelte]
format = "[✦ $version]($style) "
style = "bold orange"
disabled = false
detect_extensions = ["svelte"]
detect_files = ["svelte.config.js", "vite.config.js"]
detect_folders = ["src"]

[docker_context]
format = "[🐳 $context]($style) "
style = "bold blue"
disabled = false

[time]
disabled = false
time_format = "%R"
style = "bold white"
format = "[$time]($style) "

[cmd_duration]
min_time = 2_000
format = "[⏱️ $duration]($style) "
style = "bold yellow"
