	seedStudyProgramsFromConfig: Int!
	zpaExamsToPlan(input: [Int!]!): [ZPAExam!]!
	addZpaExamToPlan(ancode: Int!): Boolean!
	rmZpaExamFromPlan(ancode: Int!): Boolean!
}

type MutationLogArg {
	key: String!
