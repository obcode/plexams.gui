# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# GitHub recommends pinning actions to a commit SHA.
# To get a newer version, you will need to update the SHA.
# You can also reference a tag or branch, but the action may change without warning.

name: Create and publish a Docker image

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Log in to the Container registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@3add1637a63aa04f4e5fa1916f9e12090d90780a
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GUI-Version aus dem semantic-release-Release-Tag (z. B. v1.204.0) in
          # den Build reichen; vite.config.js liest sie als APP_VERSION.
          build-args: |
            APP_VERSION=${{ github.event.release.tag_name }}

  # Rollt das frisch gepushte Image auf dem Deploy-Host aus. Spiegelbildlich zum
  # Backend (plexams.go): derselbe Self-hosted-Runner (Label `plexams-deploy`),
  # derselbe on-host Stack — dieser Job fasst aber nur den `gui`-Service an, das
  # Backend nur seinen. Die docker-compose.yml synct weiterhin das Backend-Repo.
  deploy:
    needs: build-and-push-image
    # Gate wie beim Backend: erst deployen, wenn der GUI-Runner existiert (Repo-Variable
    # AUTO_DEPLOY=true). Vorher wird nur gebaut+gepusht, dieser Job übersprungen.
    if: ${{ vars.AUTO_DEPLOY == 'true' }}
    runs-on: [self-hosted, plexams-deploy]
    env:
      DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '/home/plexams/plexams.go/deploy' }}
    steps:
      - name: Deploy pinned GUI image
        run: |
          set -euo pipefail
          # release-Event → github.ref ist refs/tags/vX.Y.Z. Das "v" MUSS bleiben:
          # docker/metadata-action taggt das Image mit dem rohen Ref (v1.97.0), wie die
          # ganze Registry-Historie — ohne v läuft der Pull in ein "not found".
          VERSION="${GITHUB_REF#refs/tags/}"
          cd "$DEPLOY_DIR"
          sed -i "s/^GUI_TAG=.*/GUI_TAG=$VERSION/" .env
          docker compose pull gui
          docker compose up -d gui
          docker image prune -f
