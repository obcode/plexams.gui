name: quality

# Qualitäts-Gate: läuft auf jedem Push und PR. Ergänzt ci.yml (nur Release).
on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: check · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
      - run: npm clean-install

      # svelte-kit sync + Typprüfung. Aktuell NICHT blockierend (Baseline > 0);
      # sobald `npm run check` fehlerfrei ist, continue-on-error entfernen →
      # dann ist die Typ-Baseline scharf und darf nie wieder steigen.
      - name: check (informativ)
        run: npm run check
        continue-on-error: true

      # Harte Gates:
      - name: unit tests
        run: npm test
      - name: build
        run: npm run build
