name: quality

# Qualitäts-Gate: läuft auf jedem Push und PR. Ergänzt ci.yml (nur Release).
on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: check · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
      - run: npm clean-install

      # Harte Gates (svelte-check ist seit 2026-07 fehlerfrei → blockierend;
      # svelte-check endet mit Exit 0 bei reinen Warnungen, nur Fehler brechen):
      - name: check (svelte-check, blockierend)
        run: npm run check

      - name: unit tests
        run: npm test
      - name: build
        run: npm run build
